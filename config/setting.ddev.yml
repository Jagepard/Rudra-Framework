secret: 'YOUR_GENERATED_SECRET_HERE' # Need to be changed - php rudra secret
environment: development
cache.time:
    routes: now
    templates: now
    database: now
roles:
    admin: 0
    editor: 1
    moderator: 2
    user: 3
http.errors:
    404:
        controller: App\Ship\Errors\Controller\HttpErrorsController 
        action: error404
    503: 
        controller: App\Ship\Errors\Controller\HttpErrorsController
        action: error503
database:
    dsn: mysql:dbname=db;host=db;port=3306
    # dsn: pgsql:host=db;port=5432;dbname=db;
    # dsn: sqlite:/path-to/app/Ship/Data/rudra.sqlite
    # For mysql
    username: root
    password: root
    # For pgsql
    # username: db
    # password: db
attributes: true
containers:
    demo: App\Containers\Demo\